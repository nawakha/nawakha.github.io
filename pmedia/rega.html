<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    font-size: 16px;
    color: #000;
    background-color: #f8f8f8;
    text-align: center;
  }
  
  * {
    box-sizing: border-box;
  }
  
  .form {
    max-width: 320px;
    padding: 15px;
    margin: 20px auto;
    background-color: #fff;
    position: relative; top: 250px;
  }
  
  .input {
    display: block;
    width: 100%;
    padding: 8px 10px;
    margin-bottom: 10px;
    
    border: 1px solid #ccc;
    
    font-family: inherit;
    font-size: 16px;
  }
  
  .btn {
    display: block;
    width: 100%;
    padding: 8px 10px;
    
    border: 0;
    background-color: #1cbc11;
    cursor: pointer;
    
    font-family: inherit;
    font-size: 16px;
    color: #fff;
    text-decoration: none;
  }
  
  .btn:hover {
    background-color: #14a20a;
  }
    </style>
</head>
<body>
    <b style="font-size: 35px; position: relative; top: 200px;">Добро Пожаловать</b>
    <form class="form" action="" method="post">
        <input class="input" type="text" placeholder="ФИО">
        <input class="input" type="email" placeholder="Ваш e-mail">
        <input class="input" type="tel" placeholder="Ваш телефон">
        <input class="input" type="text" placeholder="Ваш логин">
        <input class="input" type="password" placeholder="Пароль">
        <input class="input" type="password" placeholder="Пароль еще раз">
        <a href = "site.html" class = "btn">Регистрация</a>
      </form>
</body>
</html>
